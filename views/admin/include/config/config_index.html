<script>
    window.onload = function() {
        layui.use(['form', 'layer', 'upload'], function() {
            $ = layui.jquery;

            var form = layui.form
                ,layer = layui.layer;

            // logo图片上传接口
            layui.upload.render({
                elem: '#upimg_logo', // 绑定元素
                field: 'file',
                url: {{urlfor "PublicController.Upload"}},
            done: function(res) { //上传成功后的回调
                if (res.code == 200) {
                    $('#LAY_upload_logo').attr('src', "../../"+res.data.url);
                    $('#logo').val(res.data.url);
                    top.layer.msg(res.msg, {icon: 3});
                } else {
                    top.layer.msg(res.msg, {icon: 3});
                }
            }
        });

            // favicon图片上传接口
            layui.upload.render({
                elem: '#upimg_favicon', // 绑定元素
                field: 'file',
                url: {{urlfor "PublicController.Upload"}},
            done: function(res) { //上传成功后的回调
                if (res.code == 200) {
                    $('#LAY_upload_favicon').attr('src',  "../../"+res.data.url);
                    $('#favicon').val(res.data.url);
                    top.layer.msg(res.msg, {icon: 3});
                } else {
                    top.layer.msg(res.msg, {icon: 3});
                }
            }
        });

            var url   = {{urlfor "admin.ConfigController.Save"}};
            var tourl = {{urlfor "admin.ConfigController.Index"}};

            // 监听提交
            form.on('submit(base)', function(data) {
                ajax_post(url, data.field, function () {
                    load_page(tourl);
                }, true, false);

                return false;
            });

            // 监听提交
            form.on('submit(snatch)', function(data) {
                if (typeof data.field.IsSnatch == "undefined") {
                    data.field.IsSnatch = "0";
                } else {
                    data.field.IsSnatch = "1";
                }
                if (typeof data.field.AutoNewSnatchDay == "undefined") {
                    data.field.AutoNewSnatchDay = "0";
                } else {
                    data.field.AutoNewSnatchDay = "1";
                }
                if (typeof data.field.AutoSnatchRank == "undefined") {
                    data.field.AutoSnatchRank = "0";
                } else {
                    data.field.AutoSnatchRank = "1";
                }
                if (typeof data.field.CertificationGift == "undefined") {
                    data.field.CertificationGift = "0";
                } else {
                    data.field.CertificationGift = "1";
                }
                if (typeof data.field.ExperiencMoneyOpen == "undefined") {
                    data.field.ExperiencMoneyOpen = "0";
                } else {
                    data.field.ExperiencMoneyOpen = "1";
                }
                if (typeof data.field.Market_Status == "undefined") {
                    data.field.Market_Status = "0";
                } else {
                    data.field.Market_Status = "1";
                }
                ajax_post(url, data.field, function () {
                    load_page(tourl + '?tab=snatch')
                }, true, false);

                return false;
            });

            // 监听提交
            form.on('submit(proxy)', function(data) {
                ajax_post(url, data.field, function () {
                    load_page(tourl + '?tab=proxy')
                }, true, false);

                return false;
            });
        });
    }
</script>
