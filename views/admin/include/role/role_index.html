<div class="x-body" >
  <div class="layui-card">
    <form class="layui-form x-center x-search-form" style="width:80%">
      <div class="layui-form-pane" style="margin-top: 15px;">
        <div class="layui-form-item">
<!--          <label class="layui-form-label">日期范围</label>-->
<!--          <div class="layui-input-inline">-->
<!--            <input type="text" class="layui-input" id="date-range" value="{{.Search.st}} - {{.Search.et}}">-->
<!--            <input type="hidden" class="layui-input" name="st" value="{{.Search.st}}">-->
<!--            <input type="hidden" class="layui-input" name="et" value="{{.Search.et}}">-->
<!--          </div>-->
          <div class="layui-input-inline">
            <input type="text" name="kw" placeholder="请输入关键字" autocomplete="off" class="layui-input" value="{{.Search.kw}}">
          </div>
          <div class="layui-input-inline" style="width:80px">
            <button type="button" class="layui-btn" id="btn-search"><i class="layui-icon">&#xe615;</i></button>
          </div>
        </div>
      </div>
    </form>
    <xblock>
      <button class="layui-btn" onclick="x_admin_show('添加权限', '{{urlfor "admin.RoleController.Add"}}')"><i class="layui-icon">&#xe608;</i>添加</button>
      <span class="x-right" style="line-height:40px">共有数据：{{.Count}} 条</span>
    </xblock>
    <table class="layui-table">
      <thead>
      <tr>
        <th>ID</th>
        <th>权限名称</th>
        <th>模块/方法</th>
        <th>是否菜单</th>
        <th>描述</th>
        <th>操作</th>
      </tr>
      </thead>
      <tbody>
      {{range .List}}
      <tr>
        <td>{{.Id}}</td>
        <td>{{.Name}}</td>
        <td>{{if compare .Module ""}}-{{else}}{{.Module}}/{{.Action}}{{end}}</td>
        <td>{{Str2html .IsMenuName}}</td>
        <td>{{.Desc}}</td>
        <td class="td-manage">
          <a href="javascript:;" onclick="x_admin_show('编辑', {{urlfor "admin.RoleController.Edit" "id" .Id "role" 1}})" class="layui-btn layui-btn-xs layui-btn-normal">
          <i class="layui-icon">&#xe642;</i>编辑
          </a>
          <a class="layui-btn layui-btn-xs layui-btn-danger" href="javascript:;" onclick="role_del(this,'{{.Id}}')">
            <i class="layui-icon">&#xe640;</i>删除
          </a>
        </td>

      </tr>
      {{end}}
      {{if eq .Count 0 }}
      <tr><td colspan="6" style="text-align: center">

      没有数据
      </td></tr>
      {{end}}
      </tbody>
    </table>


    <div id="page"></div>
  </div>
</div>
<script>


  // 批量删除提交
  function del_all() {
    top.layer.confirm('确认要删除吗？', function(index) {
      var ids = get_list_ids('all-x-select');
      // 发异步删除数据
      ajax_post({{urlfor "admin.RoleController.DeleteBatch"}}, {ids: ids}, reload_page);
    });
  }

  /*-删除*/
  function role_del(obj, id) {

     parent.layer.confirm('确认要删除吗？', function(index) {
      $(obj).parents("tr").remove();

      // 发异步删除数据
      ajax_post({{urlfor "admin.RoleController.Delete"}}, {id: id}, reload_page);
    });
  }
</script>
<script>
  window.onload = function () {
    layui.use(['element', 'layer', 'laydate', 'laypage', 'form'], function() {
      var $ = layui.jquery;        // jquery
      var laydate = layui.laydate; // 日期插件
      var lement = layui.element;  // 面包导航
      var layer = layui.layer;     // 弹出层
      var laypage = layui.laypage; // 分页


      // 分页
      laypage.render({
        elem: 'page',
        count: {{.Count}},
      limit: {{.Search.limit}},
      curr:  {{.Search.page}},
      prev: '<em><</em>',
              next: '<em>></em>',
              skip: false,
              jump: function (obj, first) {
        if (first != true) {
          var query = $('.x-search-form').serialize();
          query += "&page=" + obj.curr;

       //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
         window.location.href={{urlfor "admin.RoleController.Index"}} + "?" + query
          //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
         // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
        }
      }
    });

      laydate.render({
        elem: '#date-range'
        ,range: true
        ,done: function(value, date, endDate) {
          var dates = value.split(" - "); //得到日期生成的值，如：2017-08-18
          $("input[name='st']") .val(dates[0]);
          $("input[name='et']") .val(dates[1]);
        }
      });
    });

    $("#btn-search").click(function () {
      var query = $('.x-search-form').serialize();
      console.log(query)
      load_page({{urlfor "admin.RoleController.Index"}} + '?' + query);
    });
  }


</script>



{{end}}
