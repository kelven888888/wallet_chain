{{define "main"}}
<body class="x-iframe-body">

<form class="layui-form x-center x-search-form" style="width:80%">
    <div class="layui-form-pane" style="margin-top: 15px;">
        <div class="layui-form-item">
            <!--          <label class="layui-form-label">日期范围</label>-->
            <!--          <div class="layui-input-inline">-->
            <!--            <input type="text" class="layui-input" id="date-range" value="{{.Search.st}} - {{.Search.et}}">-->
            <!--            <input type="hidden" class="layui-input" name="st" value="{{.Search.st}}">-->
            <!--            <input type="hidden" class="layui-input" name="et" value="{{.Search.et}}">-->
            <!--          </div>-->
            <div class="layui-input-inline">
                <input type="text" name="kw" placeholder="请输入关键字" autocomplete="off" class="layui-input" value="{{.Search.kw}}">
            </div>
            <div class="layui-input-inline" style="width:80px">
                <button type="button" class="layui-btn" id="btn-search"><i class="layui-icon">&#xe615;</i></button>
            </div>
        </div>
    </div>
</form>
<div class="x-body">
        <div class="layui-card">

            <table class="layui-table layui-form">
                <thead>
                    <tr>
                        <th style="width: 30px"><input type="checkbox" lay-skin="primary" lay-filter="all-select"></th>
                        <th>ID</th>
                        <th>路径</th>
                        <td>用户名</td>
                        <th>方法</th>
                        <th>ip</th>
<!--                        <th>广告位</th>-->
<!--                        <th>链接</th>-->
<!--                        <th>描述</th>-->
                        <th>地址</th>
                        <th>添加时间</th>

                    </tr>
                </thead>
                <tbody id="x-img">
                {{range .List}}
                    <tr>
                        <td><input type="checkbox" lay-skin="primary" value="{{.Id}}" class="all-x-select"></td>
                        <td>{{.Id}}</td>
                        <td>{{.Path}}</td>
                        <td>{{.Username}}</td>
                        <td>
                            {{.Method}}
                        </td>
                        <td>{{.Ip}}</td>
                        <th>{{.Address}}</th>

                        <td>{{Formatdatetime .CreateAt}}</td>

                    </tr>
                {{end}}
                </tbody>
            </table>
            <div id="page"></div>
        </div>
	</div>
	<script>
		window.onload = function() {
			layui.use(['layer', 'form'], function() {
				$ = layui.jquery; //jquery
				layer = layui.layer; //弹出层


				layer.ready(function() { //为了layer.ext.js加载完毕再执行
					layer.photos({
						photos: '#x-img'
						//,shift: 5 //0-6的选择，指定弹出图片动画类型，默认随机
					});
				});
			});
		}

		// 批量删除提交
		function del_all() {
			parent.layer.confirm('确认要删除吗？', function(index) {
                var ids = get_list_ids('all-x-select');
				// 发异步删除数据
				ajax_post({{urlfor "admin.BannerController.DeleteBatch"}}, {ids: ids}, false,true, false, true);
			});
		}

		// 删除
		function del(obj, id, name) {
            parent.layer.confirm('确认要删除吗？', function(index) {
				$(obj).parents("tr").remove();

				//发异步删除数据
				ajax_post({{urlfor "admin.HotshareController.Delete"}}, {id: id, name: name}, reload_page);
			});
		}
	</script>
<script>
    window.onload = function () {
        layui.use(['element', 'layer', 'laydate', 'laypage', 'form'], function() {
            var $ = layui.jquery;        // jquery
            var laydate = layui.laydate; // 日期插件
            var lement = layui.element;  // 面包导航
            var layer = layui.layer;     // 弹出层
            var laypage = layui.laypage; // 分页


            // 分页
            laypage.render({
                elem: 'page',
                count: {{.Count}},
            limit: {{.Search.limit}},
            curr:  {{.Search.page}},
            prev: '<em><</em>',
                next: '<em>></em>',
                skip: false,
                jump: function (obj, first) {
                if (first != true) {
                    var query = $('.x-search-form').serialize();
                    query += "&page=" + obj.curr;

                    //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
                    window.location.href={{urlfor "admin.AccesslogController.Index"}} + "?" + query
                    //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
                    // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
                }
            }
        });

            laydate.render({
                elem: '#date-range'
                ,range: true
                ,done: function(value, date, endDate) {
                    var dates = value.split(" - "); //得到日期生成的值，如：2017-08-18
                    $("input[name='st']") .val(dates[0]);
                    $("input[name='et']") .val(dates[1]);
                }
            });
        });

        $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.AccesslogController.Index"}} + '?' + query);
        });
    }


</script>
</body>
{{end}}
